 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StockYard — Login</title>
<link rel="stylesheet" href="style.css" />
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    background: #0e0e0e;
    font-family: sans-serif;
  }
  .login-box {
    background: #1a1a1a;
    padding: 40px;
    border-radius: 10px;
    width: 320px;
    color: #fff;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }
  .login-box h1 {
    color: #f5a623;
    font-size: 24px;
    margin-bottom: 5px;
  }
  .login-box p {
    color: #999;
    font-size: 12px;
    margin-bottom: 25px;
  }
  .login-box input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #333;
    background: #111;
    color: #fff;
    box-sizing: border-box;
  }
  .login-box button {
    width: 100%;
    padding: 12px;
    background: #f5a623;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
  }
  .hint {
    margin-top: 15px;
    font-size: 11px;
    color: #666;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="login-box">
    <h1>STOCKYARD</h1>
    <p>INVENTORY MANAGEMENT SYSTEM</p>
    <form id="loginForm">
      <input id="username" placeholder="Username" required />
      <input id="password" type="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <div class="hint">Default: admin / admin123 &nbsp;|&nbsp; staff / staff123</div>
  </div>

  <script src="auth.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const res = login(username.value, password.value);
      if (res.ok) {
        window.location.href = "index.html";
      } else {
        alert(res.message);
      }
    });
  </script>
</body>
</html>
